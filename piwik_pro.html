    <script>
    window.addEventListener('UC_CONSENT', function (event) {
    console.log('UC_CONSENT event detail', event.detail)
    });
      ppms.cm.api(
  "setInitialComplianceSettings",
  { consents: ["analytics"] },
  console.log,
  console.error
);
  window.addEventListener("ucEvent", function (e) {
  if (e.detail && e.detail.event === "consent_status") {

    const marketingConsent = e.detail.ucCategory.marketing;
      console.log('marketing', marketingConsent);
    const piwikProConsent = e.detail["Piwik PRO"]; // exact DPS name from UC config
      console.log('piwik', piwikProConsent);

    if (marketingConsent === true && piwikProConsent === true) {
      ppms.cm.api(
        "setComplianceSettings",
        { consents: { analytics: { status: 1 } } },
        console.log,
        console.error
      );
    } else {
      ppms.cm.api(
        "setComplianceSettings",
        { consents: { analytics: { status: 0 } } },
        console.log,
        console.error
      );
    }
  }
});
